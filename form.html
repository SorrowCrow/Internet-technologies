<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form - Internet Technologies</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-light">
    <header class="bg-dark p-3">
        <nav class="container">
            <ul class="nav nav-pills">
                <li class="nav-item"><a class="nav-link text-white" href="index.html">Home</a></li>
                <li class="nav-item"><a class="nav-link active" href="form.html">Form</a></li>
                <li class="nav-item"><a class="nav-link text-white" href="table.html">Table</a></li>
                <li class="nav-item"><a class="nav-link text-white" href="shop.html">Shop</a></li>
            </ul>
        </nav>
    </header>

    <main class="container my-5">
        <div class="row justify-content-center">
            <div class="col-md-6 bg-white p-5 rounded shadow">
                <h1 class="text-center mb-4">Contact Form</h1>
                <form id="contactForm">
                    <div class="mb-3">
                        <label for="email" class="form-label">Email address</label>
                        <input type="email" class="form-control" id="email" placeholder="name@example.com" required>
                    </div>
                    
                    <div class="mb-3 form-check">
                        <input type="checkbox" class="form-check-input" id="checkbox">
                        <label class="form-check-label" for="checkbox">Remember me</label>
                    </div>

                    <div class="mb-3">
                        <label class="form-label d-block">Preferences</label>
                        <div class="form-check form-check-inline">
                            <input class="form-check-input" type="radio" name="radio" id="radio1" value="option1" checked>
                            <label class="form-check-label" for="radio1">Option 1</label>
                        </div>
                        <div class="form-check form-check-inline">
                            <input class="form-check-input" type="radio" name="radio" id="radio2" value="option2">
                            <label class="form-check-label" for="radio2">Option 2</label>
                        </div>
                    </div>

                    <div class="mb-3">
                        <label for="datepicker" class="form-label">Select Date</label>
                        <input type="date" id="datepicker" class="form-control">
                    </div>

                    <div class="mb-3">
                        <label for="select" class="form-label">Choose Category</label>
                        <select id="select" class="form-select">
                            <option value="option1">Technology</option>
                            <option value="option2">Lifestyle</option>
                            <option value="option3">Science</option>
                        </select>
                    </div>

                    <button type="submit" class="btn btn-primary w-100">Submit</button>
                </form>
            </div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
