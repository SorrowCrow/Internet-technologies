<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form - Internet technologies</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <header>
        <nav>
            <ul>
                <li class="list-item"><a href="./index.html">Home</a></li>
                <li class="list-item"><a class="active" href="form.html">Form</a></li>
                <li class="list-item"><a href="table.html">Table</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <h1>Hello, you are on form page</h1>
        <form>
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" placeholder="Email" required class="input">
            </div>
            <div class="checkbox-group">
                <input type="checkbox" id="checkbox" name="checkbox">
                <div>
                    <label for="checkbox">Checkbox</label>
                    <label for="checkbox" class="sub-label">Checkbox</label>
                </div>
            </div>
            <div class="checkbox-group">
                <input type="radio" id="radio" name="radio">
                <div>
                    <label for="radio">Radio</label>
                    <label for="radio" class="sub-label">Radio</label>
                </div>
            </div>
            <div class="form-group">
                <label for="datepicker">Datepicker</label>
                <input type="date" id="datepicker" name="datepicker" class="input">
            </div>
            <div class="form-group">
                <label for="select">Select</label>
                <select id="select" name="select" class="input">
                    <option value="option1">Option 1</option>
                    <option value="option2">Option 2</option>
                    <option value="option3">Option 3</option>
                </select>
            </div>
            <button type="submit" class="submit">Submit</button>
        </form>
    </main>
</body>

</html>
