<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Table - Internet Technologies</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-light">
    <header class="bg-dark p-3">
        <nav class="container">
            <ul class="nav nav-pills">
                <li class="nav-item"><a class="nav-link text-white" href="index.html">Home</a></li>
                <li class="nav-item"><a class="nav-link text-white" href="form.html">Form</a></li>
                <li class="nav-item"><a class="nav-link active" href="table.html">Table</a></li>
                <li class="nav-item"><a class="nav-link text-white" href="shop.html">Shop</a></li>
            </ul>
        </nav>
    </header>

    <main class="container my-5">
        <div class="p-5 bg-white rounded shadow">
            <h1 class="text-center mb-4">Media Catalog</h1>
            <div class="table-responsive">
                <table class="table table-hover table-bordered align-middle">
                    <thead class="table-dark">
                        <tr>
                            <th>Type</th>
                            <th>Name</th>
                            <th>Preview</th>
                            <th>Action</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr>
                            <td>Image</td>
                            <td>Nature Scene</td>
                            <td><img src="https://picsum.photos/id/1018/200/100" alt="Nature Scene Preview" class="img-thumbnail" style="max-width: 200px;"></td>
                            <td><button class="btn btn-sm btn-outline-dark" onclick="alert('Downloading Nature Scene...')">Download</button></td>
                        </tr>
                        <tr>
                            <td>Video</td>
                            <td>Mountain Drone Shot</td>
                            <td>
                                <video controls class="rounded" style="max-width: 200px;">
                                    <source src="mov_bbb.mp4" type="video/mp4">
                                    No Video
                                </video>
                            </td>
                            <td><button class="btn btn-sm btn-outline-dark" onclick="alert('Playing Video...')">Play</button></td>
                        </tr>
                        <tr>
                            <td>Music</td>
                            <td>Lofi Beats</td>
                            <td>
                                <audio controls style="max-width: 200px;">
                                    <source src="horse.ogg" type="audio/mpeg">
                                    No Audio
                                </audio>
                            </td>
                            <td><button class="btn btn-sm btn-outline-dark" onclick="alert('Listening to Music...')">Listen</button></td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
